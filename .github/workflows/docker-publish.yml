name: Build and Push Docker Image to GHCR

# Este workflow se ejecuta cada vez que haces un push a la rama 'main'
# Cambia 'main' si tu rama principal tiene otro nombre (ej. 'master')
on:
  push:
    branches:
      - main

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest # Usa el último ejecutor de Ubuntu disponible

    # Permisos necesarios para el GITHUB_TOKEN para este job
    permissions:
      contents: read    # Para hacer checkout del código
      packages: write   # Para subir paquetes (la imagen Docker) a GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Acción para clonar tu repositorio

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # ${{ github.repository_owner }} es tu nombre de usuario o de la organización de GitHub
          # ${{ secrets.GITHUB_TOKEN }} es un token especial que GitHub Actions provee automáticamente
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta # Le damos un ID a este paso para referenciar sus salidas
        uses: docker/metadata-action@v5
        with:
          # Genera etiquetas para la imagen basadas en el evento de Git.
          # Por ejemplo, para un push a 'main', generará etiquetas como 'latest' y 'main'.
          # La imagen se llamará ghcr.io/TU_USUARIO/NOMBRE_REPO (ej: ghcr.io/juajotagon/blogs)
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # El contexto de construcción es la raíz del repo (donde está tu Dockerfile)
          push: true # Indica que queremos hacer push de la imagen
          tags: ${{ steps.meta.outputs.tags }} # Usa las etiquetas generadas por el paso 'meta'
          labels: ${{ steps.meta.outputs.labels }} # Usa las etiquetas generadas por el paso 'meta'

server {
    listen 80;
    server_name localhost; # O el dominio que uses

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        # Intenta servir el archivo tal cual ($uri)
        # Luego intenta servir el archivo como un directorio ($uri/) buscando un index.html dentro
        # Luego intenta servir el archivo añadiendo .html ($uri.html)
        # Si nada de eso funciona, devuelve el index.html principal (útil para SPAs, opcional aquí)
        # O, si prefieres un 404 si no encuentra nada:
        try_files $uri $uri/ $uri.html =404;
        # Para muchos sitios estáticos, $uri $uri/ $uri.html es suficiente.
        # Si tu Quartz genera /page/index.html para /page/, entonces $uri $uri/ ya lo cubre.
    }

    # Opcional: Directivas de compresión (la imagen de nginx:alpine puede no tener gzip por defecto)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Opcional: Logs (la imagen de nginx ya los configura, pero puedes personalizarlos)
    # access_log /var/log/nginx/access.log;
    # error_log /var/log/nginx/error.log;

    # Opcional: Servir la página 404.html personalizada si existe
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
